<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meta Ads Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; background: #080e1a; }
      #root { height: 100%; }
      #app-loader {
        position: fixed; inset: 0; background: #080e1a;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 16px; z-index: 9999; transition: opacity 0.3s ease;
      }
      #app-loader.hidden { opacity: 0; pointer-events: none; }
      .loader-spinner {
        width: 44px; height: 44px; border-radius: 50%;
        border: 3px solid rgba(59,130,246,0.15);
        border-top-color: #3b82f6;
        animation: spin 0.8s linear infinite;
        box-shadow: 0 0 20px rgba(59,130,246,0.2);
      }
      .loader-badge {
        font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 700;
        color: #3b82f6; background: rgba(59,130,246,0.1);
        border: 1px solid rgba(59,130,246,0.25);
        padding: 3px 10px; border-radius: 20px;
        text-transform: uppercase; letter-spacing: 0.12em;
      }
      .loader-title {
        font-family: 'DM Sans', sans-serif; font-size: 15px;
        font-weight: 700; color: #e2e8f0;
      }
      .loader-sub {
        font-family: 'DM Sans', sans-serif; font-size: 12px; color: #475569;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="app-loader">
      <div class="loader-badge">● Meta Ads · Todas as Contas</div>
      <div class="loader-spinner"></div>
      <div class="loader-title">Dashboard de Performance</div>
      <div class="loader-sub">Carregando aplicação...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.__hideAppLoader = function() {
        var el = document.getElementById('app-loader');
        if (el) { el.classList.add('hidden'); setTimeout(function(){ el.remove(); }, 350); }
      };
    </script>
  </body>
</html>
